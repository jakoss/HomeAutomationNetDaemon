name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  issues: read
  checks: write
  pull-requests: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up .NET
        uses: actions/setup-dotnet@v6
        with:
          global-json-file: global.json

      - name: Restore dependencies
        run: dotnet restore HomeAutomationNetDaemon.slnx

      - name: Build with warnings as errors
        run: dotnet build HomeAutomationNetDaemon.slnx --configuration Release --no-restore /p:TreatWarningsAsErrors=true

      - name: Run tests
        run: dotnet test --solution HomeAutomationNetDaemon.slnx --configuration Release --no-build --report-trx --results-directory ./TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: test-results
          path: ./TestResults/*.trx

  publish-results:
    name: Publish Test Results
    needs: build-and-test
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Download test results
        uses: actions/download-artifact@v7
        with:
          pattern: test-results
          path: ./TestResults

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: ./TestResults/**/*.trx
